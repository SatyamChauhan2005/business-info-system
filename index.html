<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Company — Business Information System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:#1a1f2e; --navy2:#2d3748; --blue:#3b82f6; --blue-light:#93c5fd;
    --green:#16a34a; --red:#dc2626; --amber:#d97706; --purple:#4f46e5;
    --bg:#f8f9fc; --white:#ffffff; --border:#e5e7eb; --text:#374151;
    --muted:#6b7280; --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
  }
  body{font-family:var(--font);background:#eef0f5;min-height:100vh;}
  .app{display:flex;height:100vh;overflow:hidden;}

  /* SIDEBAR */
  .sidebar{width:220px;flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;padding:0;overflow-y:auto;border-right:1px solid rgba(255,255,255,.06);}
  .sidebar-logo{padding:18px 20px 14px;border-bottom:.5px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;}
  .logo-icon{width:32px;height:32px;background:#f4c430;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--navy);flex-shrink:0;}
  .logo-text{color:#fff;font-size:13px;font-weight:600;line-height:1.3;}
  .logo-sub{color:#6b7280;font-size:10px;font-weight:400;}
  .sidebar-section{padding:16px 12px 4px;}
  .sidebar-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#4b5563;padding:0 8px;margin-bottom:4px;}
  .nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:7px;cursor:pointer;color:#9ca3af;font-size:12.5px;font-weight:400;transition:background .15s,color .15s;position:relative;user-select:none;}
  .nav-item:hover{background:rgba(255,255,255,.06);color:#d1d5db;}
  .nav-item.active{background:rgba(59,130,246,.15);color:#93c5fd;}
  .nav-item.active .nav-icon{color:#3b82f6;}
  .nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0;}
  .nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;}
  .nav-badge.blue{background:var(--blue);}
  .nav-sub{padding-left:20px;}
  .nav-sub .nav-item{font-size:12px;padding:5px 10px;}
  .sidebar-bottom{margin-top:auto;padding:14px 12px;border-top:.5px solid rgba(255,255,255,.07);}
  .user-chip{display:flex;align-items:center;gap:9px;padding:8px 10px;background:rgba(255,255,255,.05);border-radius:8px;cursor:pointer;}
  .user-avatar{width:28px;height:28px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0;}
  .user-name{font-size:12px;color:#d1d5db;font-weight:500;}
  .user-role{font-size:10px;color:#6b7280;}
  .setup-link{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;font-size:11px;color:#f59e0b;cursor:pointer;margin-top:6px;}
  .setup-link:hover{background:rgba(245,158,11,.1);}

  /* MAIN */
  .main{flex:1;overflow-y:auto;display:flex;flex-direction:column;background:var(--bg);}
  .page{display:none;flex-direction:column;min-height:100%;}
  .page.active{display:flex;}

  /* TOPBAR */
  .topbar{background:#fff;border-bottom:.5px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:10;}
  .topbar-breadcrumb{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .topbar-breadcrumb strong{color:var(--navy);font-weight:600;}
  .topbar-actions{display:flex;align-items:center;gap:10px;}
  .tb-btn{background:var(--navy);color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);transition:opacity .15s;}
  .tb-btn:hover{opacity:.85;}
  .tb-btn.outline{background:#fff;color:var(--navy);border:.5px solid var(--border);}
  .tb-btn.outline:hover{background:var(--bg);}
  .tb-btn.green-btn{background:var(--green);}
  .page-body{padding:24px;flex:1;}

  /* HERO BANNERS */
  .hero{padding:28px 24px 24px;color:#fff;flex-shrink:0;}
  .hero-home{background:linear-gradient(135deg,#1a1f2e 0%,#2d3748 55%,#1e3a5f 100%);}
  .hero-tracking{background:linear-gradient(135deg,#0f4c75 0%,#1b6ca8 100%);}
  .hero-bis{background:#0f172a;position:relative;overflow:hidden;}
  .hero-bis::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 65% 50%,#1e3a5f 0%,transparent 70%);pointer-events:none;}
  .hero-bis .hero-content{position:relative;z-index:1;}
  .hero-setup{background:linear-gradient(135deg,#1e3a5f 0%,#2d3748 100%);}
  .hero-badge{background:rgba(59,130,246,.2);color:#93c5fd;border:.5px solid rgba(59,130,246,.3);border-radius:5px;font-size:10px;padding:2px 9px;display:inline-block;margin-bottom:7px;letter-spacing:.06em;text-transform:uppercase;font-weight:500;}
  .hero-title{font-size:20px;font-weight:600;color:#fff;margin-bottom:4px;}
  .hero-sub{font-size:13px;color:#94a3b8;}
  .hero-stats{display:flex;gap:22px;margin-top:18px;}
  .hero-stat .n{font-size:22px;font-weight:700;color:#fff;}
  .hero-stat .l{font-size:11px;color:#94a3b8;margin-top:1px;}
  .hero-divider{width:1px;background:rgba(255,255,255,.1);}

  /* STAT CHIPS */
  .stats-row{display:flex;gap:10px;margin-bottom:18px;}
  .stat-chip{flex:1;background:#fff;border:.5px solid var(--border);border-radius:10px;padding:10px 14px;text-align:center;}
  .stat-chip .num{font-size:22px;font-weight:700;color:var(--navy);}
  .stat-chip .lbl{font-size:11px;color:var(--muted);margin-top:2px;}
  .stat-chip.red .num{color:var(--red);}
  .stat-chip.amber .num{color:var(--amber);}
  .stat-chip.green .num{color:var(--green);}

  /* FILTERS */
  .filter-row{display:flex;gap:8px;align-items:center;margin-bottom:14px;}
  .search-bar{flex:1;background:#fff;border:.5px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px;}
  .search-bar input{border:none;outline:none;width:100%;font-family:var(--font);font-size:12px;color:var(--text);}
  .filter-pill{background:#fff;border:.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--text);cursor:pointer;white-space:nowrap;transition:all .15s;}
  .filter-pill:hover,.filter-pill.active{border-color:#93c5fd;color:var(--blue);background:#eff6ff;}

  /* TABLES */
  .table-wrap{background:#fff;border:.5px solid var(--border);border-radius:10px;overflow:hidden;}
  .task-table{width:100%;border-collapse:collapse;font-size:12px;}
  .task-table th{background:var(--navy);color:#9ca3af;text-align:left;padding:9px 14px;font-weight:500;font-size:11px;letter-spacing:.05em;text-transform:uppercase;}
  .task-table td{padding:9px 14px;border-bottom:.5px solid #f3f4f6;color:var(--text);}
  .task-table tbody tr:last-child td{border-bottom:none;}
  .task-table tbody tr:hover td{background:#f0f4ff;}
  .tid{font-weight:600;color:var(--navy);font-family:var(--mono);font-size:11px;}
  .task-badge{display:inline-block;padding:2px 9px;border-radius:5px;font-size:10px;font-weight:600;}
  .badge-late{background:#fee2e2;color:var(--red);}
  .badge-today{background:#fef3c7;color:var(--amber);}
  .badge-done{background:#d1fae5;color:var(--green);}
  .badge-pending{background:#e0e7ff;color:var(--purple);}
  .table-footer{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;font-size:11px;color:var(--muted);background:#fff;border-top:.5px solid #f3f4f6;}

  /* STATUS SELECT */
  .status-select{border:.5px solid var(--border);border-radius:5px;font-size:11px;font-family:var(--font);padding:3px 7px;background:#fff;cursor:pointer;outline:none;}

  /* PORTAL CARDS */
  .section-heading{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:14px;}
  .portals-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;}
  .portal-card{background:#fff;border:.5px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:border-color .15s,box-shadow .15s;display:flex;flex-direction:column;}
  .portal-card:hover{border-color:#93c5fd;box-shadow:0 4px 16px rgba(59,130,246,.1);}
  .portal-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:10px;flex-shrink:0;}
  .icon-blue{background:#eff6ff;} .icon-green{background:#f0fdf4;} .icon-amber{background:#fffbeb;} .icon-purple{background:#f5f3ff;} .icon-red{background:#fef2f2;} .icon-teal{background:#f0fdfa;}
  .portal-name{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:3px;}
  .portal-desc{font-size:11px;color:var(--muted);line-height:1.5;flex:1;}
  .portal-arrow{font-size:13px;color:#9ca3af;margin-top:10px;text-align:right;}

  /* TRACKING CARDS */
  .tracking-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
  .track-card{background:#fff;border:.5px solid var(--border);border-radius:10px;padding:16px;}
  .track-icon-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .track-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .track-name{font-size:13px;font-weight:600;color:var(--navy);}
  .track-desc{font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.5;}
  .track-btn{display:block;width:100%;background:var(--navy);color:#fff;border-radius:7px;padding:8px;font-size:12px;font-weight:500;text-align:center;cursor:pointer;border:none;font-family:var(--font);transition:opacity .15s;text-decoration:none;}
  .track-btn:hover{opacity:.82;}

  /* KPI ROW */
  .kpi-section{background:#fff;border:.5px solid var(--border);border-radius:10px;padding:16px;}
  .kpi-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;}
  .kpi-row{display:flex;gap:10px;}
  .kpi-box{flex:1;background:var(--bg);border:.5px solid var(--border);border-radius:8px;padding:10px 12px;}
  .kpi-num{font-size:21px;font-weight:700;color:var(--navy);}
  .kpi-num span{font-size:13px;font-weight:500;}
  .kpi-lbl{font-size:10px;color:var(--muted);margin-top:2px;}
  .kpi-up{font-size:10px;color:var(--green);font-weight:600;margin-top:2px;}

  /* BIS CARDS */
  .bis-cards-row{display:flex;gap:12px;margin-bottom:18px;}
  .bis-card{flex:1;background:#fff;border:.5px solid var(--border);border-radius:10px;padding:16px;}
  .bis-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;}
  .bis-card-title{font-size:13px;font-weight:600;color:var(--navy);}
  .bis-card-desc{font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.55;}
  .bis-card-link{font-size:11px;color:var(--blue);cursor:pointer;}
  .bis-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;}
  .tag-new{background:#d1fae5;color:#059669;} .tag-wip{background:#fef3c7;color:var(--amber);} .tag-review{background:#e0e7ff;color:var(--purple);}

  /* ACTIVITY */
  .activity-box{background:#fff;border:.5px solid var(--border);border-radius:10px;padding:16px;}
  .activity-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:.5px solid #f3f4f6;}
  .activity-row:last-child{border-bottom:none;}
  .activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .dot-blue{background:var(--blue);} .dot-green{background:var(--green);} .dot-amber{background:var(--amber);} .dot-red{background:var(--red);}
  .activity-text{font-size:12px;color:var(--text);flex:1;}
  .activity-time{font-size:10px;color:#9ca3af;}

  /* DASHBOARD */
  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .dash-card{background:#fff;border:.5px solid var(--border);border-radius:10px;padding:16px;}
  .big-metrics{display:flex;gap:12px;margin-bottom:18px;}
  .big-metric{flex:1;background:#fff;border:.5px solid var(--border);border-radius:10px;padding:18px;}
  .big-metric-icon{font-size:22px;margin-bottom:8px;}
  .big-metric-num{font-size:32px;font-weight:700;color:var(--navy);}
  .big-metric-lbl{font-size:12px;color:var(--muted);margin-top:3px;}
  .big-metric.bm-red .big-metric-num{color:var(--red);}
  .big-metric.bm-green .big-metric-num{color:var(--green);}
  .big-metric.bm-amber .big-metric-num{color:var(--amber);}

  /* BENEFITS */
  .benefits-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .benefit-card{background:#fff;border:.5px solid var(--border);border-radius:10px;padding:18px;}
  .benefit-icon{font-size:24px;margin-bottom:10px;}
  .benefit-title{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:5px;}
  .benefit-desc{font-size:11px;color:var(--muted);line-height:1.6;}

  /* SECTION LABEL */
  .sec-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;}

  /* DELEGATION */
  .delegation-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .del-card{background:#fff;border:.5px solid var(--border);border-radius:10px;padding:16px;}
  .del-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .del-title{font-size:14px;font-weight:600;color:var(--navy);}
  .del-count{font-size:11px;color:var(--muted);}
  .mini-list{margin-top:6px;}
  .mini-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:.5px solid #f3f4f6;font-size:12px;}
  .mini-item:last-child{border-bottom:none;}
  .mini-label{color:var(--text);}
  .mini-val{font-weight:600;color:var(--navy);font-family:var(--mono);font-size:11px;}

  /* CHECKLIST */
  .checklist-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:.5px solid #f3f4f6;transition:background .15s;}
  .checklist-item:last-child{border-bottom:none;}
  .checklist-item:hover{background:#f8faff;}
  .cl-check{width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex-shrink:0;}
  .cl-task{flex:1;font-size:12px;color:var(--text);}
  .cl-task.done{text-decoration:line-through;color:var(--muted);}
  .cl-meta{font-size:10px;color:var(--muted);margin-top:2px;}
  .cl-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}

  /* FORM ELEMENTS */
  .form-group{margin-bottom:14px;}
  .form-label{font-size:12px;font-weight:500;color:var(--navy);margin-bottom:5px;display:block;}
  .form-input{width:100%;border:.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:12px;font-family:var(--font);color:var(--text);outline:none;transition:border-color .15s;}
  .form-input:focus{border-color:var(--blue);}
  .form-select{width:100%;border:.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:12px;font-family:var(--font);color:var(--text);background:#fff;outline:none;cursor:pointer;}
  .form-select:focus{border-color:var(--blue);}
  .form-card{background:#fff;border:.5px solid var(--border);border-radius:10px;padding:24px;max-width:600px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-grid .full{grid-column:1/-1;}

  /* LOADING SKELETON */
  .skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .skel-row{height:36px;margin-bottom:2px;}
  .skel-stat{height:60px;border-radius:10px;margin-bottom:4px;}

  /* CONNECTION BANNER */
  .connect-banner{background:linear-gradient(135deg,#fef3c7,#fff7ed);border:.5px solid #f59e0b;border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .connect-banner.connected{background:linear-gradient(135deg,#d1fae5,#ecfdf5);border-color:var(--green);}
  .connect-banner-text{flex:1;font-size:12px;color:#92400e;}
  .connect-banner.connected .connect-banner-text{color:#065f46;}
  .connect-banner-title{font-weight:600;font-size:13px;margin-bottom:2px;}

  /* SETUP PAGE */
  .setup-step{background:#fff;border:.5px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px;}
  .step-num{width:24px;height:24px;background:var(--blue);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
  .step-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .step-title{font-size:13px;font-weight:600;color:var(--navy);}
  .step-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:10px;}
  .code-block{background:#0f172a;border-radius:8px;padding:14px;font-family:var(--mono);font-size:11px;color:#e2e8f0;overflow-x:auto;line-height:1.7;white-space:pre;margin:10px 0;}
  .copy-btn{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:var(--font);}

  /* TOAST */
  #toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
  .toast{background:#1a1f2e;color:#fff;padding:10px 16px;border-radius:9px;font-size:12px;display:flex;align-items:center;gap:8px;min-width:200px;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:slideIn .2s ease;}
  .toast.success{border-left:3px solid var(--green);}
  .toast.error{border-left:3px solid var(--red);}
  .toast.info{border-left:3px solid var(--blue);}
  @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.hidden{display:none;}
  .modal-box{background:#fff;border-radius:12px;padding:28px;max-width:520px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.2);}
  .modal-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:6px;}
  .modal-sub{font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.5;}
  .modal-actions{display:flex;gap:8px;margin-top:18px;}
  .modal-input{width:100%;border:.5px solid var(--border);border-radius:8px;padding:10px 13px;font-size:12px;font-family:var(--font);outline:none;margin-top:6px;}
  .modal-input:focus{border-color:var(--blue);}

  /* REFRESH indicator */
  .refresh-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;animation:pulse-dot 2s infinite;}
  @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
  .last-refresh{font-size:10px;color:#9ca3af;display:flex;align-items:center;}

  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px;}
  /* ═══ AUTH SCREEN ═══ */
  #auth-screen{position:fixed;inset:0;z-index:99999;background:linear-gradient(135deg,#0f172a 0%,#1a1f2e 40%,#1e3a5f 100%);display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;overflow-x:hidden;font-family:var(--font);padding:24px 16px 40px;}
  #auth-screen.hidden{display:none !important;}
  .auth-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);border-radius:16px;padding:36px 32px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,.5);backdrop-filter:blur(12px);margin:auto;}
  .auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:30px;}
  .auth-logo-icon{width:40px;height:40px;background:#f4c430;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#1a1f2e;flex-shrink:0;}
  .auth-logo-text{color:#fff;font-size:15px;font-weight:600;}
